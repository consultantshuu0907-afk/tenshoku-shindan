<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20代・新卒の就活/転職 強み診断｜あなたに合うサービスがわかる</title>
<meta name="description" content="3つの質問に答えるだけ。新卒・既卒の就活、20代の転職など、あなたの状況に合ったアドバイスとサービスを無料で診断します。">
<meta property="og:type" content="website">
<meta property="og:title" content="20代・新卒の就活/転職 強み診断｜あなたに合うサービスがわかる">
<meta property="og:description" content="3つの質問に答えるだけ。新卒・既卒の就活、20代の転職など、あなたの状況に合ったアドバイスとサービスを無料で診断します。">
<meta property="og:url" content="https://consultantshuu0907-afk.github.io/tenshoku-shindan/shinsotsu.html">

<meta name="twitter:title" content="20代・新卒の就活/転職 強み診断｜あなたに合うサービスがわかる">
<meta name="twitter:description" content="3つの質問に答えるだけ。新卒・既卒の就活、20代の転職など、あなたの状況に合ったアドバイスとサービスを無料で診断します。">

<style>
  :root{--accent:#2563eb;--accent-dark:#1d4ed8;--accent-soft:#eef4ff;--ink:#1e2433;--muted:#647088;--line:#e2e9f5;--bg:#f9fbff;--card:#fff;--radius:18px;--shadow:0 10px 30px rgba(37,99,235,.13)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;color:var(--ink);background:var(--bg);line-height:1.85;-webkit-font-smoothing:antialiased}
  .wrap{max-width:680px;margin:0 auto;padding:0 18px}
  .pr-bar{background:#eaf0f9;color:#74809a;font-size:12px;text-align:center;padding:6px 10px}
  .hero{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;padding:40px 0 46px;text-align:center;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 82% -10%,rgba(255,255,255,.18),transparent 45%)}
  .hero .wrap{position:relative;z-index:1}
  .hero .emoji{font-size:48px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15))}
  .hero h1{font-size:24px;font-weight:800;margin:10px 0 8px}
  .hero h1 .big{display:block;font-size:30px;margin-top:2px}
  .hero p{font-size:14.5px;opacity:.95;max-width:500px;margin:0 auto}
  .badge{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);color:#fff;font-size:12.5px;font-weight:700;padding:5px 14px;border-radius:999px;margin-bottom:14px;margin-top:14px}
  main{padding:30px 0 50px}
  .progress{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:22px}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.3s}
  .dot.active{background:var(--accent);transform:scale(1.25)}.dot.done{background:var(--accent-dark)}
  .q-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 22px;animation:fade .35s}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .q-step{color:var(--accent);font-weight:800;font-size:13px;letter-spacing:.1em}
  .q-text{font-size:20px;font-weight:800;margin:6px 0 20px;line-height:1.5}
  .opts{display:grid;gap:12px}
  .opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:#fff;border:2px solid var(--line);border-radius:14px;padding:15px 18px;font-size:15px;font-weight:600;color:var(--ink);cursor:pointer;transition:.18s;font-family:inherit;line-height:1.5}
  .opt:hover{border-color:var(--accent);background:var(--accent-soft);transform:translateY(-2px)}
  .opt .ic{font-size:24px;flex-shrink:0}
  .back{display:block;margin:18px auto 0;background:none;border:none;color:var(--muted);font-size:13.5px;cursor:pointer;text-decoration:underline;font-family:inherit}
  .result{display:none;animation:fade .4s}.result.show{display:block}
  .loading{text-align:center;padding:50px 0;display:none}.loading.show{display:block}
  .spinner{width:46px;height:46px;border:5px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 18px;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .type-box{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border-radius:var(--radius);padding:26px 22px;text-align:center;box-shadow:var(--shadow)}
  .type-box .lead{font-size:13px;font-weight:700;opacity:.9;letter-spacing:.08em}
  .type-box .type-name{font-size:23px;font-weight:800;margin:8px 0 10px;line-height:1.4}
  .type-box .type-desc{font-size:14.5px;opacity:.97;text-align:left}
  .block-label{font-weight:800;font-size:16px;margin:28px 0 13px;display:flex;align-items:center;gap:8px}
  .block-label .ln{flex:1;height:2px;background:var(--line);border-radius:2px}
  .strength{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--accent);border-radius:14px;padding:18px 20px;box-shadow:0 3px 10px rgba(0,0,0,.03)}
  .strength p{font-size:14.5px}
  .strength .tag{display:inline-block;background:var(--accent-soft);color:var(--accent-dark);font-weight:800;font-size:13px;padding:3px 12px;border-radius:999px;margin-bottom:9px}
  .advice{display:grid;gap:12px}
  .advice-item{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;display:flex;gap:14px;box-shadow:0 3px 10px rgba(0,0,0,.03)}
  .advice-item .ic{font-size:23px;flex-shrink:0;margin-top:2px}
  .advice-item b{display:block;font-size:15px;margin-bottom:2px}
  .advice-item span{font-size:13.5px;color:var(--muted)}
  .funnel-lead{text-align:center;font-size:14.5px;font-weight:700;margin:30px 0 6px}
  .funnel-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:16px}
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--line);margin-bottom:16px}
  .card-top{background:var(--accent-soft);padding:18px 20px;display:flex;align-items:center;gap:13px;border-bottom:1px solid var(--line)}
  .card-logo{width:50px;height:50px;border-radius:13px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:25px;flex-shrink:0;box-shadow:0 4px 10px rgba(37,99,235,.25)}
  .card-tt b{font-size:17px;display:block}.card-tt span{font-size:12.5px;color:var(--muted)}
  .card-body{padding:18px 20px}
  .feat{list-style:none;display:grid;gap:10px;margin-bottom:16px}
  .feat li{position:relative;padding-left:27px;font-size:14px}
  .feat li::before{content:"✓";position:absolute;left:0;top:2px;color:#fff;background:var(--accent);width:18px;height:18px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
  .cta{display:block;text-align:center;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;font-weight:800;font-size:16px;padding:16px;border-radius:12px;text-decoration:none;box-shadow:0 8px 18px rgba(37,99,235,.28);transition:transform .15s}
  .cta:active{transform:scale(.98)}
  .note{text-align:center;font-size:12px;color:var(--muted);margin-top:11px}
  .sub-label{text-align:center;font-size:13px;color:var(--muted);margin:22px 0 12px;font-weight:700}
  .restart{display:block;margin:24px auto 0;background:none;border:1px solid var(--line);color:var(--muted);font-size:13.5px;padding:9px 20px;border-radius:999px;cursor:pointer;font-family:inherit}
  footer{background:#1e2433;color:#c2cbe0;padding:28px 0;text-align:center;font-size:12.5px;line-height:1.9;margin-top:10px}
  footer .disc{max-width:600px;margin:0 auto 12px;opacity:.8}
  @media(max-width:480px){.hero h1{font-size:21px}.hero h1 .big{font-size:25px}.q-text{font-size:18px}}
</style>
</head>
<body>
<div class="pr-bar">本ページはプロモーション（アフィリエイト広告）を含みます</div>
<header class="hero"><div class="wrap">
  <div class="emoji">🎓</div>
  <span class="badge">かんたん3問・無料診断</span>
  <h1>20代・新卒の<span class="big">就活/転職 強み診断</span></h1>
  <p>3つの質問に答えるだけ。あなたの状況に合った進め方のアドバイスと、ぴったりのサービスを無料で診断します。</p>
</div></header>
<main class="wrap">
  <div class="progress" id="progress"></div>
  <div id="quiz"></div>
  <div class="loading" id="loading"><div class="spinner"></div><p style="font-weight:700">あなたにぴったりの進め方を診断中…</p></div>
  <div class="result" id="result"></div>
</main>
<footer><div class="wrap">
  <p class="disc">※本ページはアフィリエイトプログラムを利用しており、サービスへの登録・利用により当サイトが報酬を得る場合があります。掲載内容は各サービスの公式情報をもとに作成しています。最新・正確な情報は各公式サイトをご確認ください。</p>
  <p>© 20代・新卒の就活/転職 強み診断</p>
</div></footer>
<script>
const SERVICES={
 kimisuka:{logo:'🎓',name:'キミスカ',tag:'スカウト型の逆求人就活サイト',
   feat:['プロフィール登録で企業からスカウトが届く','適性検査で自分の強み・特性が分かる','本気度の高いゴールドスカウトが届く','新卒・既卒・第二新卒の就活に対応'],
   url:'https://px.a8.net/svt/ejp?a8mat=3Z56RE+FHV8X6+24ZO+HV7V6',cta:'無料登録してスカウトを受け取る →'},
 miidas:{logo:'🔎',name:'ミイダス',tag:'可能性診断でわかる転職サイト',
   feat:['あなたの市場価値・適正年収を無料で診断','コンピテンシー診断で強み・適性が分かる','書類選考なしの面接確約オファーが届く','自分に合った企業からスカウトが届く'],
   url:'https://px.a8.net/svt/ejp?a8mat=3T26WS+D5X2B6+3AW0+61RIA',cta:'無料で可能性診断を受ける →'}
};
const QUESTIONS=[
 {step:'Q1',text:'今のあなたの状況に近いのは？',opts:[
   {ic:'🎓',label:'新卒・既卒で、これから就活する',v:'kimisuka'},
   {ic:'💼',label:'社会人で、転職を考えている',v:'miidas'},
   {ic:'🤔',label:'まだ迷っている／自己分析から始めたい',v:'both'}]},
 {step:'Q2',text:'いちばん大事にしたいことは？',opts:[
   {ic:'🧭',label:'自分に向いている仕事を知りたい',v:'fit'},
   {ic:'💰',label:'年収・待遇の良い会社に行きたい',v:'pay'},
   {ic:'📩',label:'効率よくスカウト・オファーが欲しい',v:'scout'},
   {ic:'🌱',label:'未経験でも挑戦できる環境がいい',v:'new'}]},
 {step:'Q3',text:'就活・転職活動の進み具合は？',opts:[
   {ic:'🌱',label:'これから始める',v:'jr'},
   {ic:'🏃',label:'活動中・情報を増やしたい',v:'mid'},
   {ic:'🎯',label:'良いところがあれば決めたい',v:'sr'}]}
];
const ADV_FOCUS={
 fit:{ic:'🧭',t:'まずは「自己分析」で軸を作る',s:'自分の強み・向き不向きが分かると、企業選びの軸ができます。適性診断を使えば、感覚ではなくデータで把握できます。'},
 pay:{ic:'💰',t:'待遇は「オファーを比べて」決める',s:'1社だけで決めず、複数のスカウト・オファーを比較するのが鉄則。条件を見比べて、納得して選びましょう。'},
 scout:{ic:'📩',t:'スカウト型は「登録して待つ」だけ',s:'プロフィールを充実させて登録しておけば、あなたに興味を持った企業から声がかかります。効率よく動けます。'},
 new:{ic:'🌱',t:'20代は「ポテンシャル」が評価される',s:'未経験でも、若さと伸びしろを評価してくれる企業はたくさん。挑戦する姿勢そのものが武器になります。'}
};
const ADV_STATE={
 jr:{ic:'🚀',t:'早く動くほど「選択肢」が広がる',s:'活動を始めるのが早いほど、出会える企業も増えます。まずは登録だけでも済ませて、情報を集め始めましょう。'},
 mid:{ic:'📊',t:'活動中なら「軸の再確認」を',s:'うまくいかない時は、自己分析や市場価値の診断で軸を見直すと、応募先選びがぐっと楽になります。'},
 sr:{ic:'🎯',t:'決め時は「条件を整理」して比較',s:'良い縁があれば決めたい段階。譲れない条件を整理して、オファーを冷静に比較しましょう。'}
};
let current=0;const answers=[];
const progress=document.getElementById('progress'),quiz=document.getElementById('quiz');
function renderProgress(){progress.innerHTML='';QUESTIONS.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i<current?' done':i===current?' active':'');progress.appendChild(d);});}
function renderQuestion(){renderProgress();const q=QUESTIONS[current];quiz.innerHTML='';const card=document.createElement('div');card.className='q-card';card.innerHTML='<div class="q-step">'+q.step+' / '+QUESTIONS.length+'問</div><div class="q-text">'+q.text+'</div>';const opts=document.createElement('div');opts.className='opts';q.opts.forEach(o=>{const b=document.createElement('button');b.className='opt';b.innerHTML='<span class="ic">'+o.ic+'</span><span>'+o.label+'</span>';b.onclick=()=>{answers[current]=o.v;current++;(current<QUESTIONS.length)?renderQuestion():finish();};opts.appendChild(b);});card.appendChild(opts);if(current>0){const back=document.createElement('button');back.className='back';back.textContent='← 前の質問に戻る';back.onclick=()=>{current--;renderQuestion();};card.appendChild(back);}quiz.appendChild(card);window.scrollTo({top:0,behavior:'smooth'});}
function finish(){renderProgress();quiz.innerHTML='';document.getElementById('loading').classList.add('show');setTimeout(showResult,1500);}
function adviceHTML(a){const items=[ADV_FOCUS[a[1]],ADV_STATE[a[2]]].filter(Boolean);return items.map(x=>'<div class="advice-item"><span class="ic">'+x.ic+'</span><div><b>'+x.t+'</b><span>'+x.s+'</span></div></div>').join('');}
function cardHTML(key){const s=SERVICES[key];return '<div class="card"><div class="card-top"><div class="card-logo">'+s.logo+'</div><div class="card-tt"><b>'+s.name+'</b><span>'+s.tag+'</span></div></div><div class="card-body"><ul class="feat">'+s.feat.map(f=>'<li>'+f+'</li>').join('')+'</ul><a href="'+s.url+'" class="cta">'+s.cta+'</a><p class="note">登録・利用はすべて無料です</p></div></div>';}
function showResult(){document.getElementById('loading').classList.remove('show');const sel=answers[0];const res=document.getElementById('result');
 let typeName,cards;
 if(sel==='kimisuka'){typeName='新卒・既卒のスカウト就活タイプ';cards=cardHTML('kimisuka')+'<div class="sub-label">▼ 自己分析・適性診断も活用したい方はこちらも</div>'+cardHTML('miidas');}
 else if(sel==='miidas'){typeName='市場価値を知りたい転職タイプ';cards=cardHTML('miidas')+'<div class="sub-label">▼ 新卒・既卒のスカウト就活ならこちらも</div>'+cardHTML('kimisuka');}
 else{typeName='まずは自己分析タイプ';cards=cardHTML('miidas')+'<div class="sub-label">▼ 新卒・既卒の就活ならこちらも</div>'+cardHTML('kimisuka');}
 res.innerHTML=
  '<div class="type-box"><div class="lead">あなたのタイプは</div><div class="type-name">'+typeName+'</div><div class="type-desc">20代は「自分の適性を知ること」と「効率よくオファーを集めること」が成功のカギ。診断・スカウト型のサービスを使えば、自分に合う企業と効率的に出会えます。</div></div>'+
  '<div class="block-label">💪 20代という“強み”<span class="ln"></span></div>'+
  '<div class="strength"><span class="tag">若さ・ポテンシャル</span><p>20代は、ポテンシャルと伸びしろで評価される特別な時期。未経験の分野にも挑戦しやすく、いちばん選択肢が広いタイミングです。この強みを活かして、早めに動き出しましょう。</p></div>'+
  '<div class="block-label">🧭 あなたへのアドバイス<span class="ln"></span></div>'+
  '<div class="advice">'+adviceHTML(answers)+'</div>'+
  '<div class="funnel-lead">あとは、行動するだけ。</div>'+
  '<div class="funnel-sub">あなたの状況にいちばん合うサービスから、気軽に始めてみましょう。</div>'+
  cards+
  '<div style="text-align:center;font-weight:700;font-size:13.5px;color:var(--muted);margin:26px 0 12px">▼ あわせて使いたい｜応募前の企業リサーチ・選考対策に</div>'+'<div class="card"><div class="card-top"><div class="card-logo">💼</div><div class="card-tt"><b>ワンキャリア転職</b><span>企業の年収・口コミ・選考対策がわかる転職サイト</span></div></div><div class="card-body"><ul class="feat"><li>気になる企業の「リアルな年収・社員クチコミ」を無料でチェックできる</li><li>実際の「選考体験談」で面接・選考の対策ができる</li><li>その企業への／からのキャリアパスがわかる</li><li>応募前の企業研究にぴったり。登録は無料</li></ul><a href="https://px.a8.net/svt/ejp?a8mat=4B650G+75SPPU+5O7E+BYT9F" class="cta">無料で企業のクチコミ・年収を見る →</a><p class="note">登録・利用はすべて無料です</p></div></div>'+'<button class="restart" onclick="restart()">↺ もう一度診断する</button>';
 res.classList.add('show');window.scrollTo({top:0,behavior:'smooth'});}
function restart(){current=0;answers.length=0;document.getElementById('result').classList.remove('show');renderQuestion();}
renderQuestion();
</script>
</body>
</html>
