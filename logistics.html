<body>

<script>
const QUESTIONS=[
 {step:'Q1',text:'転職で、いちばん叶えたいことは？',opts:[

 res.innerHTML=

  '<a href="http://www.rentracks.jp/adx/r.html?idx=0.57954.382823.8271.12975&dna=151600" class="cta">無料でドライバー求人を見る →</a>'+
  '<p class="note">求人検索・応募はすべて無料です</p></div></div>'+
  '<div style="font-weight:800;font-size:16px;margin:30px 0 5px">🗂️ どの業界でも“定番”の総合サービス</div>'+'<div style="font-size:12.5px;color:var(--muted);margin-bottom:14px">求人の多くは一般に公開されていません。登録しておくほど、出会える選択肢が増えます（すべて無料）。</div>'+'<a href="https://t.afi-b.com/visit.php?a=r6873w-6276811K&p=3919027v" style="display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 15px;text-decoration:none;color:var(--ink);margin-bottom:10px"><span style="font-size:13.8px"><b>リクナビNEXT</b><br><span style="color:var(--muted);font-size:12px">求人数トップクラス。まず登録して市場を把握</span></span><span style="color:var(--accent);font-weight:800;font-size:18px">→</span></a>'+'<a href="https://t.afi-b.com/visit.php?a=968723-W528197J&p=3919027v" style="display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 15px;text-decoration:none;color:var(--ink);margin-bottom:10px"><span style="font-size:13.8px"><b>リクルートエージェント</b><br><span style="color:var(--muted);font-size:12px">非公開25万件以上＋公開約75万件。選考・交渉も代行</span></span><span style="color:var(--accent);font-weight:800;font-size:18px">→</span></a>'+'<a href="https://t.afi-b.com/visit.php?a=u9385W-K317675N&p=3919027v" style="display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 15px;text-decoration:none;color:var(--ink);margin-bottom:10px"><span style="font-size:13.8px"><b>リクルートダイレクトスカウト</b><br><span style="color:var(--muted);font-size:12px">登録して待つだけ。企業から直接スカウトが届く</span></span><span style="color:var(--accent);font-weight:800;font-size:18px">→</span></a>'+'<a href="https://t.afi-b.com/visit.php?a=X14973i-e488671W&p=3919027v" style="display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 15px;text-decoration:none;color:var(--ink  res.classList.add('show');window.scrollTo({top:0,behavior:'smooth'});}
function restart(){current=0;answers.length=0;document.getElementById('result').classList.remove('show');renderQuestion();}
renderQuestion();
