<style>

<body>
<div class="pr-bar">本ページはプロモーション（アフィリエイト広告）を含みます</div>
<header class="hero"><div class="wrap">

<script>
const QUESTIONS=[
 {step:'Q1',text:'転職で、いちばん叶えたいことは？',opts:[

let current=0;const answers=[];
const progress=document.getElementById('progress'),quiz=document.getElementById('quiz');
function renderProgress(){progress.innerHTML='';QUESTIONS.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i<current?' done':i===current?' active':'');progress.appendChild(d);});}

 res.innerHTML=

  '<div class="card"><div class="card-top"><div class="card-logo">🏠</div><div class="card-tt"><b>宅建Jobエージェント</b><span>不動産・宅建士専門の転職エージェント</span></div></div>'+
  '<div class="card-body"><ul class="feat"><li>不動産業界・宅建士に特化した転職エージェント</li><li>非公開求人を含む3,000件以上の求人を保有</li><li>累計17万人以上が利用。約70%が年収アップに成功</li><li>書類添削・面接対策・年収交渉まで代行</li></ul>'+
  '<a href="https://px.a8.net/svt/ejp?a8mat=3Z56RG+ZQ3E2+4I3U+BYDTT" class="cta">無料で不動産求人を相談する →</a>'+
  '<p class="note">登録・相談・サポートはすべて無料です</p></div></div>'+
  '<div style="font-weight:800;font-size:16px;margin:30px 0 5px">🗂️ どの業界でも“定番”の総合サービス</div>'+'<div style="font-size:12.5px;color:var(--muted);margin-bottom:14px">求人の多くは一般に公開されていません。登録しておくほど、出会える選択肢が増えます（すべて無料）。</div>'+'<a href="https://t.afi-b.com/visit.php?a=r6873w-6276811K&p=3919027v" style="display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 15px;text-decoration:none;color:var(--ink);margin-bottom:10px"><span style="font-size:13.8px"><b>リクナビNEXT</b><br><span style="color:var(--muted);font-size:12px">求人数トップクラス。まず登録して市場を把握</span></span><span style="color:var(--accent);font-weight:800;font-size:18px">→</span></a>'+'<a href="https://t.afi-b.com/visit.php?a=968723-W528197J&p=3919027v" style="display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 15px;text-decoration:none;color:var(--ink);margin-bottom:10px"><span style="font-size:13.8px"><b>リクルートエージェント</b><br><span style="color:var(--muted);font-size:12px">非公開25万件以上＋公開約75万件。選考・交渉も代行</span></span><span style="color:var(--accent);font-weight:800;font-size:18px">→</span></a>'+'<a href="https://t.afi-b.com/visit.php?a=u9385W-K317675N&p=3919027v" style="display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 15px;text-decoration:none;color:var(--ink);margin-bottom:10px"><span style="font-size:13.8px"><b>リクルートダイレクトスカウト</b><br><span style="color:var(--muted);font-size:12px">登録して待つだけ。企業から直接スカウトが届く</span></span><span style="color:var(--accent);font-weight:800;font-size:18px">→</span></a>'+'<a href="https://t.afi-b.com/visit.php?a=X14973i-e488671W&p=3919027v" style="display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 15px;text-decoration:none;color:var(--ink);margin-bottom:10px"><span style="font-size:13.8px"><b>転職AGENT Navi</b><br><span style="color:var(--muted);font-size:12px">10万件以上の求人・300人超から相性の良い担当を紹介</span></span><span style="color:var(--accent);font-weight:800;font-size:18px">→</span></a>'+'<div style="text-align:center;font-weight:700;font-size:13.5px;color:var(--muted);margin:26px 0 12px">▼ あわせて使いたい｜応募前の企業リサーチ・選考対策に</div>'+'<div class="card"><div class="card-top"><div class="card-logo">💼</div><div class="card-tt"><b>ワンキャリア転職</b><span>企業の年収・口コミ・選考対策がわかる転職サイト</span></div></div><div class="card-body"><ul class="feat"><li>気になる企業の「リアルな年収・社員クチコミ」を無料でチェックできる</li><li>実際の「選考体験談」で面接・選考の対策ができる</li><li>その企業への／からのキャリアパスがわかる</li><li>応募前の企業研究にぴったり。登録は無料</li></ul><a href="https://px.a8.net/svt/ejp?a8mat=4B650G+75SPPU+5O7E+BYT9F" class="cta">無料で企業のクチコミ・年収を見る →</a><p class="note">登録・利用はすべて無料です</p></div></div>'+'<button class="restart" onclick="restart()">↺ もう一度診断する</button>';
 res.classList.add('show');window.scrollTo({top:0,behavior:'smooth'});}
function restart(){current=0;answers.length=0;document.getElementById('result').classList.remove('show');renderQuestion();}
renderQuestion();
</script>
