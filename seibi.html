/* kyujin-cool: 求人ビジネス感×かっこよさ ------------------------------------
   Signature Noir（統合確定版）: biz-upgrade / pro-polish の上に重ねる最上位レイヤー
   ・ダーク中性色 #0e1116 を全ページ共通の「クールの錨」に
   ・業界 --accent はパレット不変のまま、線(罫)・点(ドット)・CTA地色にのみ限定投入
   ・HTML非編集。既存の実在クラスと ::before/::after のみで成立
   ・診断ページ9枚の style終了タグ直前にそのまま貼る
-------------------------------------------------------------------------- */
:root{
  --nk:#0e1116;                                              /* near-black anchor（全業界共通） */
  --nk2:#161b25;                                             /* panel */
  --acc-lift:color-mix(in srgb,var(--accent) 78%,#fff);      /* 低明度accentをヒーロー等で持ち上げ */
  --hair:color-mix(in srgb,var(--accent) 34%,var(--line));   /* accentヘアライン */
  --glow:color-mix(in srgb,var(--accent) 55%,transparent);
}

/* 上端：採用ブランドのダーク帯 --------------------------------------------- */
.pr-bar{background:var(--nk);color:color-mix(in srgb,#fff 60%,transparent);letter-spacing:.04em;border-bottom:2px solid var(--accent)}

/* ヒーロー：黒地に業界色がにじむ（低明度accentは--acc-liftで可視化） --------- */
.hero{background:linear-gradient(160deg,var(--nk),color-mix(in srgb,var(--acc-lift) 30%,var(--nk)));box-shadow:0 10px 30px rgba(8,10,16,.30)}
.hero::after{opacity:.55}                                    /* 白radialは弱める */
.hero::before{background:var(--accent);height:4px;opacity:.95}/* 下端アクセント罫線（既存4px白帯を上書き） */
.hero .emoji{background:rgba(255,255,255,.06);border:1px solid color-mix(in srgb,var(--acc-lift) 60%,#fff);border-radius:14px}
.hero h1{position:relative;display:inline-block;padding-bottom:13px}
.hero h1::after{content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:46px;height:3px;background:var(--accent);border-radius:2px}
/* ヒーローだけ英字キッカー。emojiより前に出るのを利用し“採用メディアの冠”に */
.hero .wrap::before{content:"CAREER DIAGNOSIS";display:block;font-size:10.5px;font-weight:700;letter-spacing:.26em;color:var(--acc-lift);margin-bottom:14px;text-align:center}
/* バッジ：塗り→outlineチップ＋英字感 */
.badge{background:transparent;border:1px solid color-mix(in srgb,var(--acc-lift) 62%,#fff);color:#fff;letter-spacing:.10em;border-radius:8px}
.badge::before{content:"▪";color:var(--accent);margin-right:7px}

/* 進捗ドット：activeはaccent、doneは中性色で工程感 ------------------------- */
.dot.done{background:color-mix(in srgb,var(--accent) 50%,var(--nk))}

/* ステップ番号：英字は足さず、accent色＋広字間＋左の鋭いtickだけで魅せる ----- */
.q-step{color:var(--accent);letter-spacing:.14em;position:relative;padding-left:15px}
.q-step::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:14px;background:var(--accent);border-radius:2px;box-shadow:0 0 8px -1px var(--glow)}

/* 設問カード：エッジ締め --------------------------------------------------- */
.q-card{border-radius:12px;border:1px solid color-mix(in srgb,var(--ink) 10%,var(--line));box-shadow:0 1px 2px rgba(8,10,16,.06),0 16px 34px -14px rgba(8,10,16,.20)}

/* 選択肢：平ら＋左accentインジケータ（hoverで出現） ------------------------ */
.opt{border-radius:10px;border-width:1.5px;border-left:3px solid transparent;transition:border-color .16s,box-shadow .16s,transform .16s,background .16s}
.opt:hover{border-left-color:var(--accent);transform:translateY(-1px);box-shadow:0 8px 18px -8px var(--glow)}

/* 結果タイプ帯：黒×accent（帯はダーク、名称は白、リードはaccent） ---------- */
.type-box{background:linear-gradient(155deg,var(--nk),color-mix(in srgb,var(--acc-lift) 32%,var(--nk)));border-radius:12px;border:1px solid rgba(255,255,255,.08);box-shadow:0 22px 46px -18px rgba(8,10,16,.55)}
.type-box .lead{color:var(--acc-lift);letter-spacing:.20em;text-transform:uppercase;opacity:1}
.type-box .type-name{color:#fff}
.type-box .type-desc{color:rgba(255,255,255,.94)}
.type-box::after{background:radial-gradient(circle,var(--glow),transparent 60%);opacity:.45}

/* セクションラベル：column化せず、左tick＋末尾.lnをaccentヘアライン化 ------- */
.block-label{position:relative;border-bottom:none;padding-left:13px;letter-spacing:.02em}
.block-label::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:1em;background:var(--accent);border-radius:2px}
.block-label .ln{display:block;flex:1;height:1px;background:var(--hair);border-radius:0}   /* 非表示の.lnを復活＝紙面ヘアライン */

/* 強みラベル：塗りチップ→outlineチップ ------------------------------------ */
.strength{border-radius:12px;border-left-width:3px}
.strength .tag{background:transparent;border:1px solid color-mix(in srgb,var(--accent) 48%,var(--line));color:var(--accent-dark);border-radius:6px;letter-spacing:.05em}

/* アドバイス：フラット化 --------------------------------------------------- */
.advice-item{border-radius:10px}

/* ファネル区切り：破線→accentヘアラインの実線 ------------------------------ */
.funnel-lead{border-top:1px solid var(--hair)}

/* サービスカード：黒ヘッダーの採用カード（card-tt白上書きが必須） ---------- */
.card{border-radius:10px;border:1px solid color-mix(in srgb,var(--ink) 12%,var(--line))}
.card-top{background:var(--nk);border-bottom:1px solid rgba(255,255,255,.08)}
.card-tt b{color:#fff}
.card-tt span{color:color-mix(in srgb,#fff 60%,transparent)}
.card-logo{border-radius:10px;background:var(--accent);box-shadow:0 6px 16px -6px var(--glow),inset 0 1px 0 rgba(255,255,255,.25)}
.feat li::before{border-radius:4px}                          /* 丸→角丸スクエアでシャープに */

/* CTA：唯一のベタaccent＝金彩の一撃（主役ボタンとして際立たせる） ---------- */
.cta{border-radius:12px;letter-spacing:.03em;box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 12px 22px -10px var(--glow)}
.cta:hover{transform:translateY(-2px);box-shadow:inset 0 1px 0 rgba(255,255,255,.28),0 18px 30px -10px var(--glow)}
.cta-sub{border-radius:10px}

.note{color:color-mix(in srgb,var(--muted) 90%,#000);letter-spacing:.02em}
.restart{border-radius:8px;border-color:var(--line)}
footer{background:var(--nk)}

  /* cro-cvr: コンバージョン最適化レイヤー（追従CTA/安心チップ/摩擦低減） */
  .cta{min-height:56px;display:flex;align-items:center;justify-content:center}
  .cta-lead{text-align:center;font-size:13px;font-weight:700;color:var(--accent-dark);margin:0 0 11px;line-height:1.65}
  .assure{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:11px}
  .assure span{font-size:11.5px;color:var(--muted);border:1px solid var(--hair);border-radius:999px;padding:3px 10px}
  .hero-assure{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  .hero-assure span{font-size:11.5px;font-weight:600;letter-spacing:.02em;color:#fff;background:rgba(255,255,255,.06);border:1px solid color-mix(in srgb,var(--acc-lift) 45%,#fff);border-radius:999px;padding:5px 11px}
  .jump-service{display:block;margin:14px auto 2px;background:none;border:none;color:var(--accent-dark);font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:3px}
  .sticky-cta{position:fixed;left:0;right:0;bottom:0;z-index:900;display:flex;align-items:center;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:var(--nk);border-top:1px solid var(--accent);box-shadow:0 -8px 24px rgba(8,10,16,.35);transform:translateY(125%);transition:transform .22s ease}
  body.show-sticky .sticky-cta{transform:translateY(0)}
  body.show-sticky main{padding-bottom:108px}
  .sc-tag{flex:none;font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--acc-lift);border:1px solid color-mix(in srgb,var(--acc-lift) 55%,#fff);border-radius:6px;padding:5px 9px}
  .sc-btn{flex:1;min-height:52px;display:flex;align-items:center;justify-content:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:800;font-size:15px;color:#fff;text-decoration:none;background:linear-gradient(180deg,var(--accent),var(--accent-dark));border-radius:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 8px 18px -8px var(--glow)}
</style>

<div class="pr-bar">本ページはプロモーション（アフィリエイト広告）を含みます</div>
<header class="hero"><div class="wrap">

  <p>© 自動車整備士の転職 タイプ診断</p>

<script>

 miidas:{type:'まず自分を知りたい「自己分析」タイプ',logo:'🔎',name:'ミイダス',tag:'可能性診断で適職・市場価値がわかる',line:'診断で適職・市場価値がわかる',
   feat:['コンピテンシー診断で「向いている仕事」が分かる','市場価値・適正年収を無料で診断できる','利用企業44万社以上','書類選考なしの面接確約オファーも届く'],
   url:'https://px.a8.net/svt/ejp?a8mat=3T26WS+D5X2B6+3AW0+61RIA',cta:'無料で可能性診断を受ける →'},
 ragent:{type:'プロと二人三脚「じっくり相談」タイプ',logo:'🤝',name:'リクルートエージェント',tag:'非公開求人が豊富な総合エージェント',line:'非公開25万件以上。プロが伴走',
   feat:['非公開25万件以上＋公開約75万件','専任アドバイザーが選考対策・条件交渉を代行','転職決定数の実績が豊富','はじめての転職でも安心のサポート'],
   url:'https://t.afi-b.com/visit.php?a=968723-W528197J&p=3919027v',cta:'無料で求人を紹介してもらう →'},
 scout:{type:'待つだけでOK「スカウト」タイプ',logo:'📩',name:'リクルートダイレクトスカウト',tag:'登録して待つスカウト型サービス',line:'登録して待つだけ。年収UPも',
   feat:['登録すれば企業・ヘッドハンターからスカウトが届く','ハイクラス・好条件の求人が多い','今の仕事を続けながら市場価値を確認できる','匿名で使えるので気軽に始められる'],
   url:'https://t.afi-b.com/visit.php?a=u9385W-K317675N&p=3919027v',cta:'無料で登録してスカウトを待つ →'},
 rikunabi:{type:'自分のペースで探す「マイペース」タイプ',logo:'🗂️',name:'リクナビNEXT',tag:'求人数トップクラスの転職サイト',line:'求人数トップクラス。自分で探せる',
   feat:['求人数トップクラスで選択肢が広い','グッドポイント診断で自分の強みが分かる','企業からのスカウト機能もある','まず登録して市場を把握するのに最適'],

 agentnavi:{type:'まず比較したい「エージェント選び」タイプ',logo:'🧭',name:'転職AGENT Navi',tag:'自分に合うエージェントを無料で紹介',line:'10万件以上・300人超から紹介',
   feat:['10万件以上の求人・300人超のアドバイザー','あなたに合う転職エージェントを無料で紹介','初めての転職でも相性の良い担当が見つかる','複数を比較して選べるので失敗しにくい'],
   url:'https://t.afi-b.com/visit.php?a=X14973i-e488671W&p=3919027v',cta:'無料で合うエージェントを探す →'}
};
const ORDER=['miidas','ragent','scout','rikunabi','agentnavi'];
const QUESTIONS=[
 {step:'Q1',text:'整備士のあなた、転職はどう進めたい？',opts:[
   {ic:'🔎',label:'まず自分の適職・市場価値を知りたい',v:'miidas'},
   {ic:'🤝',label:'プロに相談して、じっくり進めたい',v:'ragent'},

   {ic:'🗂️',label:'自分のペースで求人を探したい',v:'rikunabi'},
   {ic:'🧭',label:'どのエージェントが合うか比較したい',v:'agentnavi'}]},
 {step:'Q2',text:'転職で、いちばん重視するのは？',opts:[
   {ic:'💰',label:'年収・待遇アップ',v:'pay'},
   {ic:'⏰',label:'働き方・休みの改善',v:'time'},
   {ic:'🚀',label:'スキルアップ・キャリア',v:'skill'},
   {ic:'🌱',label:'未経験の分野に挑戦したい',v:'new'}]},
 {step:'Q3',text:'今の状況に近いのは？',opts:[
   {ic:'🔍',label:'在職中で、まずは情報収集',v:'info'},
   {ic:'🏃',label:'できるだけ早く転職したい',v:'soon'},
   {ic:'🤔',label:'まだ迷っている／相談したい',v:'undecided'}]}
];
const ADV_FOCUS={
 pay:{ic:'💰',t:'年収アップは「複数比較」で決める',s:'1社の提示額で決めず、複数のサービスで求人・条件を見比べるほど、適正な待遇を引き出せます。'},
 time:{ic:'⏰',t:'働き方は「譲れない条件」を先に決める',s:'休日・残業・勤務地など、ゆずれない条件を最初にハッキリさせると、入ってから後悔しません。'},
 skill:{ic:'🚀',t:'成長は「身につくスキル」で職場を選ぶ',s:'目先の条件だけでなく、その環境で何が身につくかを軸にすると、長期的なキャリアで差がつきます。'},
 new:{ic:'🌱',t:'未経験は「ポテンシャル採用」を狙う',s:'若さや意欲を評価してくれる求人は確実にあります。まず自分の可能性を診断で把握しておきましょう。'}
};
const ADV_STATE={
 info:{ic:'📥',t:'在職中の「情報収集」がいちばん安全',s:'今すぐ動かなくても、登録して求人・市場価値を知っておくだけで、いざという時の選択肢が広がります。'},
 soon:{ic:'⚡',t:'急ぐなら「プロと並走」で時短',s:'専任担当が日程調整や条件交渉を代行してくれるので、働きながらでもスムーズに進められます。'},
 undecided:{ic:'🗺️',t:'迷うなら「まず診断・相談」から',s:'方向性が固まっていなくても大丈夫。自分の市場価値を知る／プロに話す中で、進む道が見えてきます。'}
};
let current=0;const answers=[];
const progress=document.getElementById('progress'),quiz=document.getElementById('quiz');
function renderProgress(){progress.innerHTML='';QUESTIONS.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i<current?' done':i===current?' active':'');progress.appendChild(d);});}
function renderQuestion(){renderProgress();const q=QUESTIONS[current];quiz.innerHTML='';const card=document.createElement('div');card.className='q-card';card.innerHTML='<div class="q-step">'+q.step+' / '+QUESTIONS.length+'問</div><div class="q-text">'+q.text+'</div>';const opts=document.createElement('div');opts.className='opts';q.opts.forEach(o=>{const b=document.createElement('button');b.className='opt';b.innerHTML='<span class="ic">'+o.ic+'</span><span>'+o.label+'</span>';b.onclick=()=>{answers[current]=o.v;current++;(current<QUESTIONS.length)?renderQuestion():finish();};opts.appendChild(b);});card.appendChild(opts);if(current>0){const back=document.createElement('button');back.className='back';back.textContent='← 前の質問に戻る';back.onclick=()=>{current--;renderQuestion();};card.appendChild(back);}quiz.appendChild(card);document.getElementById('progress').scrollIntoView({behavior:'smooth',block:'start'});}
function finish(){renderProgress();quiz.innerHTML='';document.getElementById('loading').classList.add('show');setTimeout(showResult,1500);}
function adviceHTML(a){const items=[ADV_FOCUS[a[1]],ADV_STATE[a[2]]].filter(Boolean);return items.map(x=>'<div class="advice-item"><span class="ic">'+x.ic+'</span><div><b>'+x.t+'</b><span>'+x.s+'</span></div></div>').join('');}
function fullCard(key){const s=SERVICES[key];return '<div class="card"><div class="card-top"><div class="card-logo">'+s.logo+'</div><div class="card-tt"><b>'+s.name+'</b><span>'+s.tag+'</span></div></div><div class="card-body"><ul class="feat">'+s.feat.map(f=>'<li>'+f+'</li>').join('')+'</ul><a href="'+s.url+'" class="cta" target="_self">'+s.cta+'</a><p class="note">登録・相談・利用はすべて無料です</p></div></div>';}
function miniCard(key){const s=SERVICES[key];const st='display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 15px;text-decoration:none;color:var(--ink);margin-bottom:10px';return '<a href="'+s.url+'" style="'+st+'"><span style="font-size:13.8px"><b>'+s.name+'</b><br><span style="color:var(--muted);font-size:12px">'+s.line+'</span></span><span style="color:var(--accent);font-weight:800;font-size:18px">→</span></a>';}
function showResult(){document.getElementById('loading').classList.remove('show');const sel=answers[0];const s=SERVICES[sel]||SERVICES.ragent;const others=ORDER.filter(k=>k!==sel);const res=document.getElementById('result');
 res.innerHTML=
  '<div class="type-box"><div class="lead">あなたに合う進め方は</div><div class="type-name">'+s.type+'</div><div class="type-desc">整備の技術と資格は、人手不足が続く業界で強く求められています。進め方に合ったサービスから、待遇や環境の良い職場を探しましょう。</div></div>'+
  '<div class="block-label">🧭 転職は「情報量」で決まる<span class="ln"></span></div>'+
  '<div class="strength"><span class="tag">手に職 × 整備の技術力</span><p>点検・車検・故障診断・修理を的確にこなしてきた経験は、ディーラー・整備工場・カー用品店など多くの現場で歓迎されます。有資格ならなおさら。まずは条件に合う求人と相場を知ることから始めましょう。</p></div>'+
  '<div class="block-label">🧭 あなたへのアドバイス<span class="ln"></span></div>'+
  '<div class="advice">'+adviceHTML(answers)+'</div>'+
  '<div class="funnel-lead">まずは、あなたに合うこの1社から。</div>'+
  '<div class="funnel-sub">登録も相談もすべて無料。今の仕事を続けながら情報を集めるだけでも大丈夫です。</div>'+
  fullCard(sel)+
  '<div style="font-weight:800;font-size:16px;margin:30px 0 5px">🗂️ 他の総合サービスも比較できます</div>'+
  '<div style="font-size:12.5px;color:var(--muted);margin-bottom:14px">複数に登録するほど、出会える求人と選択肢は増えます（すべて無料）。</div>'+
  others.map(miniCard).join('')+
  '<div style="text-align:center;font-weight:700;font-size:13.5px;color:var(--muted);margin:26px 0 12px">▼ あわせて使いたい｜応募前の企業リサーチ・選考対策に</div>'+
  '<div class="card"><div class="card-top"><div class="card-logo">💼</div><div class="card-tt"><b>ワンキャリア転職</b><span>企業の年収・口コミ・選考対策がわかる転職サイト</span></div></div><div class="card-body"><ul class="feat"><li>気になる企業の「リアルな年収・社員クチコミ」を無料でチェックできる</li><li>実際の「選考体験談」で面接・選考の対策ができる</li><li>その企業への／からのキャリアパスがわかる</li><li>応募前の企業研究にぴったり。登録は無料</li></ul><a href="https://px.a8.net/svt/ejp?a8mat=4B650G+75SPPU+5O7E+BYT9F" class="cta">無料で企業のクチコミ・年収を見る →</a><p class="note">登録・利用はすべて無料です</p></div></div>'+
  '<button class="restart" onclick="restart()">↺ もう一度診断する</button>';
 res.classList.add('show');window.scrollTo({top:0,behavior:'smooth'});}
function restart(){current=0;answers.length=0;document.getElementById('result').classList.remove('show');renderQuestion();}
renderQuestion();
</script>
<script>
/* cro-cvr */
(function(){
  var badge=document.querySelector('.badge');
  if(badge&&badge.getAttribute('data-cro')!=='1'){badge.setAttribute('data-cro','1');badge.textContent=badge.textContent+'｜約1分・登録不要';}
  var hw=document.querySelector('.hero .wrap');
  if(hw&&!hw.querySelector('.hero-assure')){hw.insertAdjacentHTML('beforeend','<div class="hero-assure"><span>🔒 個人情報の入力なし</span><span>💴 登録も相談も無料</span><span>🕒 在職中でもOK</span></div>');}
  var result=document.getElementById('result');
  if(!result)return;
  var bar=document.createElement('div');bar.className='sticky-cta';bar.setAttribute('aria-hidden','true');
  var tag=document.createElement('span');tag.className='sc-tag';tag.textContent='無料';
  var btn=document.createElement('a');btn.className='sc-btn';btn.setAttribute('href','#');
  bar.appendChild(tag);bar.appendChild(btn);document.body.appendChild(bar);
  var primaryEl=null,lastSticky=null;
  function sticky(on){if(lastSticky===on)return;lastSticky=on;document.body.classList[on?'add':'remove']('show-sticky');bar.setAttribute('aria-hidden',on?'false':'true');}
  function updateSticky(){
    if(!result.classList.contains('show')||!primaryEl){sticky(false);return;}
    var rc=primaryEl.getBoundingClientRect();
    var inView=(rc.top<window.innerHeight-40)&&(rc.bottom>64);
    sticky(!inView);
  }
  window.addEventListener('scroll',updateSticky,{passive:true});
  window.addEventListener('resize',updateSticky,{passive:true});
  function firstCta(card){var b=card.querySelector('.card-body');if(!b)return null;var k=b.children;for(var i=0;i<k.length;i++){if(k[i].classList&&k[i].classList.contains('cta'))return k[i];}return null;}
  function decorate(){
    if(!result.classList.contains('show')){primaryEl=null;sticky(false);return;}
    var cards=result.querySelectorAll('.card');
    for(var i=0;i<cards.length;i++){
      var body=cards[i].querySelector('.card-body');if(!body)continue;
      var cta=firstCta(cards[i]);if(!cta)continue;
      if(i===0&&!body.querySelector('.cta-lead')){cta.insertAdjacentHTML('beforebegin','<p class="cta-lead">好条件の求人ほど“表に出ないまま”決まっていきます。登録しておくほど、出会える数が増えます（無料）。</p>');}
      if(!body.querySelector('.cta-sub')){var s=document.createElement('a');s.className='cta-sub';s.setAttribute('href',cta.getAttribute('href'));s.textContent='▶ まずは無料登録だけ済ませておく';cta.insertAdjacentElement('afterend',s);}
      var note=body.querySelector('.note');
      if(note&&!body.querySelector('.assure')){note.insertAdjacentHTML('beforebegin','<div class="assure"><span>無料</span><span>在職中でもOK</span><span>登録は約1分</span></div>');note.textContent='掲載内容は各サービスの公式情報をもとに記載しています';}
    }
    var tb=result.querySelector('.type-box');
    if(tb&&!result.querySelector('.jump-service')){var j=document.createElement('button');j.type='button';j.className='jump-service';j.textContent='▶ あなたに合うサービスを今すぐ見る';j.addEventListener('click',function(){var c=result.querySelector('.card');if(c)c.scrollIntoView({behavior:'smooth',block:'start'});});tb.insertAdjacentElement('afterend',j);}
    var primary=null,cs=result.querySelectorAll('.card');
    for(var p=0;p<cs.length;p++){primary=firstCta(cs[p]);if(primary)break;}
    if(primary){btn.setAttribute('href',primary.getAttribute('href'));btn.textContent=(primary.textContent||'無料で見てみる').replace(/\s+/g,' ').trim();primaryEl=primary;lastSticky=null;updateSticky();}
    else{primaryEl=null;sticky(false);}
  }
  new MutationObserver(function(){decorate();}).observe(result,{attributes:true,attributeFilter:['class']});
  if(result.classList.contains('show'))decorate();
})();
</script>
