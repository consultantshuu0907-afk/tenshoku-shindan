<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飲食業界からの転職タイプ診断｜あなたに合う転職の方向性は？</title>
<meta name="description" content="3つの質問に答えるだけ。飲食・外食業界で働くあなたに合った転職の方向性と、おすすめの転職エージェントを無料で診断します。">
<style>
  :root{
    --accent:#e8590c; --accent-dark:#c2410c; --accent-soft:#fff4ed;
    --ink:#2b2320; --muted:#7a6f68; --line:#f0e6df; --bg:#fffaf6; --card:#fff;
    --radius:18px; --shadow:0 10px 30px rgba(200,90,20,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;color:var(--ink);background:var(--bg);line-height:1.8;-webkit-font-smoothing:antialiased}
  .wrap{max-width:680px;margin:0 auto;padding:0 18px}
  .pr-bar{background:#f4ede7;color:#8a7d73;font-size:12px;text-align:center;padding:6px 10px}

  .hero{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;padding:40px 0 46px;text-align:center;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 82% -10%,rgba(255,255,255,.18),transparent 45%)}
  .hero .wrap{position:relative;z-index:1}
  .hero .emoji{font-size:48px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15))}
  .hero h1{font-size:26px;font-weight:800;margin:10px 0 8px}
  .hero h1 .big{display:block;font-size:32px;margin-top:2px}
  .hero p{font-size:14.5px;opacity:.95;max-width:480px;margin:0 auto}
  .badge{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);color:#fff;font-size:12.5px;font-weight:700;padding:5px 14px;border-radius:999px;margin-bottom:14px}

  main{padding:30px 0 50px}

  /* 進捗 */
  .progress{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:22px}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.3s}
  .dot.active{background:var(--accent);transform:scale(1.25)}
  .dot.done{background:var(--accent-dark)}

  .q-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 22px;animation:fade .35s}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .q-step{color:var(--accent);font-weight:800;font-size:13px;letter-spacing:.1em}
  .q-text{font-size:20px;font-weight:800;margin:6px 0 20px;line-height:1.5}
  .opts{display:grid;gap:12px}
  .opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:#fff;border:2px solid var(--line);border-radius:14px;padding:15px 18px;font-size:15.5px;font-weight:600;color:var(--ink);cursor:pointer;transition:.18s;font-family:inherit}
  .opt:hover{border-color:var(--accent);background:var(--accent-soft);transform:translateY(-2px)}
  .opt .ic{font-size:24px;flex-shrink:0}
  .back{display:block;margin:18px auto 0;background:none;border:none;color:var(--muted);font-size:13.5px;cursor:pointer;text-decoration:underline;font-family:inherit}

  /* 結果 */
  .result{display:none;animation:fade .4s}
  .result.show{display:block}
  .loading{text-align:center;padding:50px 0;display:none}
  .loading.show{display:block}
  .spinner{width:46px;height:46px;border:5px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 18px;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .type-box{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border-radius:var(--radius);padding:26px 22px;text-align:center;box-shadow:var(--shadow);margin-bottom:8px}
  .type-box .lead{font-size:13px;font-weight:700;opacity:.9;letter-spacing:.08em}
  .type-box .type-name{font-size:26px;font-weight:800;margin:8px 0 10px}
  .type-box .type-desc{font-size:14.5px;opacity:.97}

  .reco-label{text-align:center;font-weight:800;color:var(--accent);margin:30px 0 14px;font-size:15px}
  .reco-label span{display:block;font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.08em;margin-top:2px}

  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--line)}
  .card-top{background:var(--accent-soft);padding:18px 20px;display:flex;align-items:center;gap:13px;border-bottom:1px solid var(--line)}
  .card-logo{width:50px;height:50px;border-radius:13px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:25px;flex-shrink:0;box-shadow:0 4px 10px rgba(200,90,20,.25)}
  .card-tt b{font-size:17px;display:block}
  .card-tt span{font-size:12.5px;color:var(--muted)}
  .card-body{padding:18px 20px}
  .why{background:var(--accent-soft);border-radius:12px;padding:12px 15px;font-size:13.5px;margin-bottom:16px}
  .why b{color:var(--accent-dark)}
  .feat{list-style:none;display:grid;gap:10px;margin-bottom:16px}
  .feat li{position:relative;padding-left:27px;font-size:14px}
  .feat li::before{content:"✓";position:absolute;left:0;top:2px;color:#fff;background:var(--accent);width:18px;height:18px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
  .cta{display:block;text-align:center;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;font-weight:800;font-size:16px;padding:16px;border-radius:12px;text-decoration:none;box-shadow:0 8px 18px rgba(200,90,20,.28);transition:transform .15s}
  .cta:active{transform:scale(.98)}
  .cta-sub{display:block;text-align:center;margin-top:10px;color:var(--accent-dark);font-weight:700;font-size:14px;text-decoration:none}
  .cta-sub:hover{text-decoration:underline}
  .note{text-align:center;font-size:12px;color:var(--muted);margin-top:11px}
  .restart{display:block;margin:24px auto 0;background:none;border:1px solid var(--line);color:var(--muted);font-size:13.5px;padding:9px 20px;border-radius:999px;cursor:pointer;font-family:inherit}

  footer{background:#2b2320;color:#cdbfb6;padding:28px 0;text-align:center;font-size:12.5px;line-height:1.9;margin-top:10px}
  footer .disc{max-width:600px;margin:0 auto 12px;opacity:.8}
  @media(max-width:480px){.hero h1{font-size:22px}.hero h1 .big{font-size:27px}.q-text{font-size:18px}}
</style>
</head>
<body>

<div class="pr-bar">本ページはプロモーション（アフィリエイト広告）を含みます</div>

<header class="hero">
  <div class="wrap">
    <div class="emoji">🍴</div>
    <span class="badge" id="hero-badge" style="margin-top:14px">かんたん3問・無料診断</span>
    <h1>飲食業界からの<span class="big">転職タイプ診断</span></h1>
    <p>3つの質問に答えるだけ。あなたに合った転職の方向性と、ぴったりの転職サービスを無料で診断します。</p>
  </div>
</header>

<main class="wrap">
  <div class="progress" id="progress"></div>

  <!-- 質問 -->
  <div id="quiz"></div>

  <!-- ローディング -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="font-weight:700">あなたにぴったりの転職プランを診断中…</p>
  </div>

  <!-- 結果 -->
  <div class="result" id="result"></div>
</main>

<footer>
  <div class="wrap">
    <p class="disc">※本ページはアフィリエイトプログラムを利用しており、サービスへの登録・利用により当サイトが報酬を得る場合があります。掲載内容は各サービスの公式情報をもとに作成しています。最新・正確な情報は各公式サイトをご確認ください。</p>
    <p>© 飲食業界の転職タイプ診断</p>
  </div>
</footer>

<script>
const QUESTIONS = [
  { step:'Q1', text:'今、いちばん変えたいことは？',
    opts:[
      {ic:'💸',label:'給料・収入を上げたい',v:'pay'},
      {ic:'⏰',label:'休みや労働時間を改善したい',v:'time'},
      {ic:'📉',label:'将来性・キャリアが不安',v:'future'},
      {ic:'😣',label:'人間関係・職場環境を変えたい',v:'human'},
    ]},
  { step:'Q2', text:'転職の方向性は、どちらに近いですか？',
    opts:[
      {ic:'🍽️',label:'飲食業界の中で、もっと良い職場へ',v:'in'},
      {ic:'🚀',label:'飲食以外の異業種にチャレンジしたい',v:'out'},
      {ic:'🤔',label:'まだ決めていない／相談しながら決めたい',v:'undecided'},
    ]},
  { step:'Q3', text:'飲食での経験年数は？',
    opts:[
      {ic:'🌱',label:'3年未満',v:'jr'},
      {ic:'💪',label:'3〜7年',v:'mid'},
      {ic:'👑',label:'7年以上・店長/マネージャー経験あり',v:'sr'},
    ]},
];

// 診断タイプ（Q1×Q2の組み合わせで方向性メッセージを出し分け）
function diagnose(a){
  const reasonMap = {
    pay:   {n:'収入アップ志向タイプ',  d:'今の頑張りが給料に反映されていない状態。飲食経験は「成果を出せる人材」として評価されます。年収を上げられる職場・職種への転職が有効です。'},
    time:  {n:'ワークライフ重視タイプ',d:'働き方そのものを見直したい段階。土日休み・時間が読める職場へ移ることで、生活の質が大きく変わります。'},
    future:{n:'キャリア再設計タイプ',  d:'この先も続けられるか不安を感じている状態。早めに市場価値を確かめ、長く働ける道を設計するのが正解です。'},
    human: {n:'環境リセットタイプ',    d:'人間関係や職場の雰囲気で消耗している状態。職場を変えるだけで驚くほど楽になることも。まず選択肢を知ることが第一歩です。'},
  };
  const dirMap = {
    in:        '飲食業界内でのより良い職場探しは、業界の内情を知る専門エージェントが最も力を発揮します。',
    out:       '異業種への転身は、接客・売上管理・スタッフ教育の経験を“どう言い換えるか”がカギ。飲食出身者の転職を熟知したプロが力になります。',
    undecided: '方向性が固まっていなくても大丈夫。飲食専門のアドバイザーに相談しながら、自分に合う道を一緒に見つけるのが近道です。',
  };
  const r = reasonMap[a[0]] || reasonMap.future;
  return { typeName:r.n, typeDesc:r.d + ' ' + (dirMap[a[1]]||dirMap.undecided) };
}

let current=0; const answers=[];
const progress=document.getElementById('progress');
const quiz=document.getElementById('quiz');

function renderProgress(){
  progress.innerHTML='';
  QUESTIONS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i<current?' done':i===current?' active':'');
    progress.appendChild(d);
  });
}
function renderQuestion(){
  renderProgress();
  const q=QUESTIONS[current];
  quiz.innerHTML='';
  const card=document.createElement('div');
  card.className='q-card';
  card.innerHTML='<div class="q-step">'+q.step+' / '+QUESTIONS.length+'問</div><div class="q-text">'+q.text+'</div>';
  const opts=document.createElement('div'); opts.className='opts';
  q.opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML='<span class="ic">'+o.ic+'</span><span>'+o.label+'</span>';
    b.onclick=()=>{answers[current]=o.v; current++; (current<QUESTIONS.length)?renderQuestion():finish();};
    opts.appendChild(b);
  });
  card.appendChild(opts);
  if(current>0){
    const back=document.createElement('button');
    back.className='back'; back.textContent='← 前の質問に戻る';
    back.onclick=()=>{current--;renderQuestion();};
    card.appendChild(back);
  }
  quiz.appendChild(card);
  window.scrollTo({top:0,behavior:'smooth'});
}
function finish(){
  renderProgress();
  quiz.innerHTML='';
  document.getElementById('loading').classList.add('show');
  setTimeout(showResult,1400);
}
function showResult(){
  document.getElementById('loading').classList.remove('show');
  const d=diagnose(answers);
  const res=document.getElementById('result');
  res.innerHTML=
    '<div class="type-box"><div class="lead">あなたの転職タイプは</div><div class="type-name">'+d.typeName+'</div><div class="type-desc">'+d.typeDesc+'</div></div>'+
    '<div class="reco-label">あなたにおすすめの転職サービス<span>FOR YOU</span></div>'+
    '<div class="card">'+
      '<div class="card-top"><div class="card-logo">🍴</div><div class="card-tt"><b>フーズラボ・エージェント</b><span>飲食・外食業界専門の転職エージェント</span></div></div>'+
      '<div class="card-body">'+
        '<div class="why"><b>なぜあなたに？</b> '+whyText(answers)+'</div>'+
        '<ul class="feat">'+
          '<li>飲食業界に特化したアドバイザーが現場を理解した上でサポート</li>'+
          '<li>表に出ない非公開求人を多数保有。好条件の職場と出会える</li>'+
          '<li>飲食内でのキャリアアップも、異業種への転身も相談できる</li>'+
          '<li>面接対策・条件交渉まで代行してくれるので安心</li>'+
        '</ul>'+
        '<a href="http://www.rentracks.jp/adx/r.html?idx=0.57954.382823.3623.5462&dna=77604" class="cta" target="_blank" rel="noopener">無料でキャリア相談する →</a>'+
        '<a href="https://px.a8.net/svt/ejp?a8mat=3TDA1J+2DQFW2+3TJY+BXB8Z" class="cta-sub" target="_blank" rel="noopener">▶ かんたん60秒・無料登録はこちら</a>'+
        '<p class="note">登録・相談・サポートはすべて無料です</p>'+
      '</div>'+
    '</div>'+
    '<button class="restart" onclick="restart()">↺ もう一度診断する</button>';
  res.classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});
}
function whyText(a){
  const exp = a[2]==='sr' ? '店長・マネジメント経験は、どの業界でも高く評価される強みです。' :
              a[2]==='mid' ? '3〜7年の実務経験は、即戦力として歓迎されるゾーンです。' :
              '若さとポテンシャルを活かせる今が、動くのに最適なタイミングです。';
  return 'あなたの回答から、'+exp+'飲食業界を知り尽くしたフーズラボなら、あなたの経験を正しく評価してくれる職場を提案できます。';
}
function restart(){current=0;answers.length=0;document.getElementById('result').classList.remove('show');renderQuestion();}

renderQuestion();
</script>
</body>
</html>
